<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agendar Coleta - EcoGestão</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
    <div class="logo">♻ Gestão de Resíduos</div>
</header>

<section class="agendamento">

    <h2>Agendar Coleta</h2>
    <p class="subtitulo">
        Preencha as informações abaixo para solicitar a coleta de resíduos
    </p>

    <form class="form-agendamento">

        <div class="campo">
            <label>Nome</label>
            <input type="text" placeholder="Seu nome completo">
        </div>

        <div class="campo">
            <label>Email</label>
            <input type="email" placeholder="seu@email.com">
        </div>

        <div class="campo">
            <label>Tipo de Resíduo</label>
            <select>
                <option>Selecione</option>
                <option>Plástico</option>
                <option>Papel</option>
                <option>Vidro</option>
                <option>Metal</option>
                <option>Eletrônicos</option>
            </select>
        </div>

        <div class="campo">
            <label>Endereço</label>
            <input type="text" placeholder="Rua, número e bairro">
        </div>

        <div class="campo">
            <label>Data da Coleta</label>
            <input type="date">
        </div>

        <div class="campo">
            <label>Observações</label>
            <textarea placeholder="Informações adicionais"></textarea>
        </div>

        <button type="submit" class="btn-agendar">
            Agendar Coleta
        </button>

    </form>

</section>

</body>
</html>
