<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro - Sistema de Gestão de Descarte</title>

<link rel="stylesheet" href="login.css">
<link rel="stylesheet" href="inicio.css">
</head>

<body>

<div class="container">

    <div class="icon">♻</div>

    <h1>Criar Conta</h1>
    <p class="subtitle">Preencha os dados para se cadastrar no sistema</p>

    <form>

        <div class="form-group">
            <label>Nome</label>
            <input type="text" placeholder="Seu nome completo">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="seu@email.com">
        </div>

        <div class="form-group">
            <label>Senha</label>
            <input type="password" placeholder="••••••••">
        </div>

        <div class="form-group">
            <label>Confirmar Senha</label>
            <input type="password" placeholder="••••••••">
        </div>

        <div class="buttons">
            <a href="main1.html" class="btn-primary">Cadastre-se</a>
        </div>

    </form>

    <div class="signup">
        Já tem uma conta? <a href="login.html">Entrar</a>
        <h1></h1>
        <a href="inicio.html">Voltar ao inicio</a>
    </div>

</div>

</body>
</html>
